version: "3"

vars:
  APP: '{{default "" .APP}}'
  ENV: '{{default "" .ENV}}'

tasks:
  # Claude Code
  claude:
    desc: Launch Claude Code with secrets from Doppler (provisioner project)
    cmds:
      - doppler run --project provisioner --config dev -- claude --mcp-config mcp.json

  # Install
  install:
    desc: Install all dependencies
    cmds:
      - npm install

  # Dev
  dev:
    desc: "Start dev (all apps, or APP=name for one)"
    cmds:
      - npx turbo dev {{if .APP}}--filter={{.APP}}{{end}}

  # Build
  build:
    desc: "Build (all apps, or APP=name for one)"
    cmds:
      - npx turbo build {{if .APP}}--filter={{.APP}}{{end}}

  # Lint
  lint:
    desc: "Lint (all apps, or APP=name for one)"
    cmds:
      - npx turbo lint {{if .APP}}--filter={{.APP}}{{end}}

  # Test
  test:
    desc: "Run tests (all apps, or APP=name for one)"
    cmds:
      - npx turbo test {{if .APP}}--filter={{.APP}}{{end}}

  # Inject shared pages
  inject:
    desc: Inject shared pages into all apps
    cmds:
      - cd apps/hairlukgud && node ../../scripts/inject-pages.mjs
      - cd apps/hairfordays && node ../../scripts/inject-pages.mjs
      - cd apps/aseesthreads && node ../../scripts/inject-pages.mjs

  # Clean injected pages
  clean:pages:
    desc: Remove injected pages from all apps
    cmds:
      - npx turbo clean:pages

  # Database — single shared Supabase instance for all stores
  db:start:
    desc: Start shared Supabase instance
    cmds:
      - npx supabase start

  db:stop:
    desc: Stop shared Supabase instance
    cmds:
      - npx supabase stop

  db:reset:
    desc: Reset shared Supabase DB (re-runs all migrations + seed)
    cmds:
      - npx supabase db reset

  # Terragrunt — Vercel project (once per store, no env)
  tg:vercel:
    desc: "Create/update Vercel project for a store (APP=store, ENV=dev|prod)"
    dir: terraform/stores/{{.APP}}/vercel
    preconditions:
      - sh: '[ -n "{{.APP}}" ] && [ -n "{{.ENV}}" ]'
        msg: "APP and ENV required (e.g. task tg:vercel APP=hairlukgud ENV=dev)"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt apply

  # Terragrunt — Resend domain (once per store, no env)
  tg:resend:
    desc: "Register Resend domain for a store (APP=store, ENV=dev|prod)"
    dir: terraform/stores/{{.APP}}/resend
    preconditions:
      - sh: '[ -n "{{.APP}}" ] && [ -n "{{.ENV}}" ]'
        msg: "APP and ENV required (e.g. task tg:resend APP=hairlukgud ENV=dev)"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt apply

  # Terragrunt — Doppler project (APP=hairlukgud|hairfordays)
  tg:doppler:
    desc: "Create/update Doppler project for a store (APP=store, ENV=dev|prod)"
    dir: terraform/stores/{{.APP}}/doppler
    preconditions:
      - sh: '[ -n "{{.APP}}" ] && [ -n "{{.ENV}}" ]'
        msg: "APP and ENV required (e.g. task tg:doppler APP=hairlukgud ENV=dev)"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt apply

  # Terragrunt — Store environment (ENV=dev|prod, APP=hairlukgud|hairfordays)
  tg:init:
    desc: "Terragrunt init (ENV=dev|prod, APP=store)"
    dir: terraform/stores/{{.APP}}/{{.ENV}}
    preconditions:
      - sh: '[ -n "{{.ENV}}" ] && [ -n "{{.APP}}" ]'
        msg: "ENV and APP required (e.g. task tg:init ENV=dev APP=hairlukgud)"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt init

  tg:plan:
    desc: "Terragrunt plan (ENV=dev|prod, APP=store)"
    dir: terraform/stores/{{.APP}}/{{.ENV}}
    preconditions:
      - sh: '[ -n "{{.ENV}}" ] && [ -n "{{.APP}}" ]'
        msg: "ENV and APP required"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt plan

  tg:apply:
    desc: "Terragrunt apply (ENV=dev|prod, APP=store)"
    dir: terraform/stores/{{.APP}}/{{.ENV}}
    preconditions:
      - sh: '[ -n "{{.ENV}}" ] && [ -n "{{.APP}}" ]'
        msg: "ENV and APP required"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt apply

  tg:destroy:
    desc: "Terragrunt destroy (ENV=dev|prod, APP=store)"
    dir: terraform/stores/{{.APP}}/{{.ENV}}
    preconditions:
      - sh: '[ -n "{{.ENV}}" ] && [ -n "{{.APP}}" ]'
        msg: "ENV and APP required"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt destroy

  tg:all:
    desc: "Terragrunt run-all for a store (APP=store) — applies doppler + all envs"
    dir: terraform/stores/{{.APP}}
    preconditions:
      - sh: '[ -n "{{.APP}}" ]'
        msg: "APP required (e.g. task tg:all APP=hairlukgud)"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt run-all apply
