name: Database Migrations

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - prod
          - both

permissions:
  contents: read

jobs:
  push-dev:
    if: github.ref == 'refs/heads/dev' || inputs.env == 'dev' || inputs.env == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Push migrations to dev
        working-directory: apps/hairlukgud
        run: |
          SUPABASE_URL=$(doppler secrets get NEXT_PUBLIC_SUPABASE_URL --plain --project hairlukgud --config dev)
          PROJECT_REF=$(echo "$SUPABASE_URL" | sed 's|https://||;s|\.supabase\.co||')
          DB_PASS=$(doppler secrets get SUPABASE_DB_PASSWORD --plain --project hairlukgud --config dev)
          SUPABASE_ACCESS_TOKEN=$(doppler secrets get SUPABASE_ACCESS_TOKEN --plain --project provisioner --config dev)
          export SUPABASE_ACCESS_TOKEN
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --password "$DB_PASS"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  push-prod:
    if: github.ref == 'refs/heads/main' || inputs.env == 'prod' || inputs.env == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Push migrations to prod
        working-directory: apps/hairlukgud
        run: |
          SUPABASE_URL=$(doppler secrets get NEXT_PUBLIC_SUPABASE_URL --plain --project hairlukgud --config prod)
          PROJECT_REF=$(echo "$SUPABASE_URL" | sed 's|https://||;s|\.supabase\.co||')
          DB_PASS=$(doppler secrets get SUPABASE_DB_PASSWORD --plain --project hairlukgud --config prod)
          SUPABASE_ACCESS_TOKEN=$(doppler secrets get SUPABASE_ACCESS_TOKEN --plain --project provisioner --config prod)
          export SUPABASE_ACCESS_TOKEN
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --password "$DB_PASS"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
