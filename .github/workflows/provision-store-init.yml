name: Provision Store

on:
  workflow_dispatch:
    inputs:
      store:
        description: "Store name"
        required: true
        type: choice
        options:
          - hairlukgud
          - hairfordays
      env:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Terragrunt action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  # --- Step 1: Provision shared Supabase project (must exist before any store) ---
  shared-supabase:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/shared/supabase/${{ inputs.env }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/326684407897/locations/global/workloadIdentityPools/github-auth/providers/github
          service_account: terraform@directed-relic-343301.iam.gserviceaccount.com

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch secrets from Doppler
        run: |
          doppler secrets download --project provisioner --config ${{ inputs.env }} --no-file --format json | jq -r 'to_entries[] | "\(.key)=\(.value)"' | while IFS='=' read -r key val; do
            if [[ "$key" == TF_VAR_* ]]; then
              suffix="${key#TF_VAR_}"
              key="TF_VAR_$(echo "$suffix" | tr '[:upper:]' '[:lower:]')"
            fi
            echo "$key=$val" >> "$GITHUB_ENV"
          done
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Configure Terraform Cloud credentials
        run: |
          mkdir -p ~/.terraform.d
          jq -n --arg token "$TF_CLOUD_TOKEN" \
            '{"credentials":{"app.terraform.io":{"token":$token}}}' \
            > ~/.terraform.d/credentials.tfrc.json

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64 -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Terragrunt Init
        run: terragrunt init -upgrade

      - name: Terragrunt Apply (shared Supabase)
        run: terragrunt apply -auto-approve -lock=false

  # --- Step 2: Create Doppler project + environments (per store, after Supabase) ---
  doppler-project:
    needs: shared-supabase
    if: always() && !cancelled() && (needs.shared-supabase.result == 'success' || needs.shared-supabase.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/stores/${{ inputs.store }}/doppler

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/326684407897/locations/global/workloadIdentityPools/github-auth/providers/github
          service_account: terraform@directed-relic-343301.iam.gserviceaccount.com

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch secrets from Doppler
        run: |
          doppler secrets download --project provisioner --config ${{ inputs.env }} --no-file --format json | jq -r 'to_entries[] | "\(.key)=\(.value)"' | while IFS='=' read -r key val; do
            if [[ "$key" == TF_VAR_* ]]; then
              suffix="${key#TF_VAR_}"
              key="TF_VAR_$(echo "$suffix" | tr '[:upper:]' '[:lower:]')"
            fi
            echo "$key=$val" >> "$GITHUB_ENV"
          done
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Configure Terraform Cloud credentials
        run: |
          mkdir -p ~/.terraform.d
          jq -n --arg token "$TF_CLOUD_TOKEN" \
            '{"credentials":{"app.terraform.io":{"token":$token}}}' \
            > ~/.terraform.d/credentials.tfrc.json

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64 -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Terragrunt Init
        run: terragrunt init -upgrade

      - name: Terragrunt Apply
        if: inputs.action == 'apply'
        run: terragrunt apply -auto-approve -lock=false

  # --- Step 3: Provision store (Vercel, Resend, Doppler secrets) ---
  provision-store:
    needs: doppler-project
    if: always() && !cancelled() && needs.doppler-project.result != 'failure'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/stores/${{ inputs.store }}/${{ inputs.env }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/326684407897/locations/global/workloadIdentityPools/github-auth/providers/github
          service_account: terraform@directed-relic-343301.iam.gserviceaccount.com

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch secrets from Doppler
        run: |
          doppler secrets download --project provisioner --config ${{ inputs.env }} --no-file --format json | jq -r 'to_entries[] | "\(.key)=\(.value)"' | while IFS='=' read -r key val; do
            if [[ "$key" == TF_VAR_* ]]; then
              suffix="${key#TF_VAR_}"
              key="TF_VAR_$(echo "$suffix" | tr '[:upper:]' '[:lower:]')"
            fi
            echo "$key=$val" >> "$GITHUB_ENV"
          done
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Configure Terraform Cloud credentials
        run: |
          mkdir -p ~/.terraform.d
          jq -n --arg token "$TF_CLOUD_TOKEN" \
            '{"credentials":{"app.terraform.io":{"token":$token}}}' \
            > ~/.terraform.d/credentials.tfrc.json

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64 -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Terragrunt Init
        run: terragrunt init -upgrade

      - name: Terragrunt ${{ inputs.action }}
        run: |
          if [ "${{ inputs.action }}" = "apply" ]; then
            terragrunt apply -auto-approve -lock=false
          elif [ "${{ inputs.action }}" = "destroy" ]; then
            terragrunt destroy -auto-approve -lock=false
          else
            terragrunt plan -lock=false
          fi

  # --- Step 4: Run migrations + seed admin ---
  post-provision:
    needs: provision-store
    if: inputs.action == 'apply'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch secrets from Doppler
        run: |
          doppler secrets download --project ${{ inputs.store }} --config ${{ inputs.env }} --no-file --format json | jq -r 'to_entries[] | "\(.key)=\(.value)"' | while IFS='=' read -r key val; do
            echo "::add-mask::$val"
            echo "$key=$val" >> "$GITHUB_ENV"
          done
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Get Supabase access token
        run: |
          TOKEN=$(doppler secrets get TF_VAR_SUPABASE_ACCESS_TOKEN --plain --project provisioner --config ${{ inputs.env }})
          echo "::add-mask::$TOKEN"
          echo "SUPABASE_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Run database migrations
        working-directory: apps/${{ inputs.store }}
        run: |
          PROJECT_REF=$(echo "$NEXT_PUBLIC_SUPABASE_URL" | sed 's|https://||;s|\.supabase\.co||')
          DB_PASS=$(doppler secrets get SUPABASE_DB_PASSWORD --plain --project ${{ inputs.store }} --config ${{ inputs.env }})
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --password "$DB_PASS"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Seed admin user
        run: |
          SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
          STORE_ID="${{ inputs.store }}"

          # Ensure store row exists
          curl -sf -X POST \
            "$SUPABASE_URL/rest/v1/stores" \
            -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
            -H "apikey: $SUPABASE_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=ignore-duplicates,return=minimal" \
            -d "{\"id\": \"$STORE_ID\", \"display_name\": \"$STORE_ID\", \"domain\": \"$STORE_ID.com\"}" || true

          # Create admin user via Supabase Auth Admin API (with store_id in metadata)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$SUPABASE_URL/auth/v1/admin/users" \
            -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
            -H "apikey: $SUPABASE_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"email\": \"$ADMIN_EMAIL\",
              \"password\": \"$ADMIN_PASSWORD\",
              \"email_confirm\": true,
              \"user_metadata\": {\"full_name\": \"Store Admin\", \"store_id\": \"$STORE_ID\"}
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            USER_ID=$(echo "$BODY" | jq -r '.id')
            echo "Admin user created: $ADMIN_EMAIL (id: $USER_ID)"
          elif echo "$BODY" | grep -q "already been registered"; then
            echo "Admin user already exists: $ADMIN_EMAIL"
            USER_ID=$(echo "$BODY" | jq -r '.id // empty')
            if [ -z "$USER_ID" ]; then
              USER_RESP=$(curl -s -X GET \
                "$SUPABASE_URL/auth/v1/admin/users?filter=email%3D$ADMIN_EMAIL" \
                -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
                -H "apikey: $SUPABASE_SECRET_KEY")
              USER_ID=$(echo "$USER_RESP" | jq -r '.users[0].id // empty')
            fi
            if [ -z "$USER_ID" ]; then
              echo "::warning::Could not find user ID for existing admin — profile may need manual setup"
              exit 0
            fi
          else
            echo "::error::Failed to create admin user: $BODY"
            exit 1
          fi

          # Wait for handle_new_user trigger to create profile
          sleep 2

          # Check if profile exists for this store; if not, create it
          PROFILE_CHECK=$(curl -s \
            "$SUPABASE_URL/rest/v1/profiles?id=eq.$USER_ID&store_id=eq.$STORE_ID&select=id" \
            -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
            -H "apikey: $SUPABASE_SECRET_KEY")

          if [ "$PROFILE_CHECK" = "[]" ]; then
            curl -sf -X POST \
              "$SUPABASE_URL/rest/v1/profiles" \
              -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
              -H "apikey: $SUPABASE_SECRET_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"id\": \"$USER_ID\", \"email\": \"$ADMIN_EMAIL\", \"full_name\": \"Store Admin\", \"store_id\": \"$STORE_ID\", \"role\": \"admin\"}"
            echo "Admin profile created for store $STORE_ID"
          else
            curl -sf -X PATCH \
              "$SUPABASE_URL/rest/v1/profiles?id=eq.$USER_ID&store_id=eq.$STORE_ID" \
              -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
              -H "apikey: $SUPABASE_SECRET_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d '{"role": "admin"}'
            echo "Admin role set for $ADMIN_EMAIL in store $STORE_ID"
          fi
