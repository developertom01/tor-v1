name: Provision Store

on:
  workflow_dispatch:
    inputs:
      store:
        description: "Store name"
        required: true
        type: choice
        options:
          - hairlukgud
          - hairfordays
      env:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Terragrunt action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  terragrunt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/envs/${{ inputs.env }}/${{ inputs.store }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/326684407897/locations/global/workloadIdentityPools/github-auth/providers/github
          service_account: terraform@directed-relic-343301.iam.gserviceaccount.com

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch secrets from Doppler
        run: doppler secrets download --project provisioner --config ${{ inputs.env }} --no-file --format env >> "$GITHUB_ENV"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Setup Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64 -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Terragrunt Init
        run: terragrunt init

      - name: Terragrunt ${{ inputs.action }}
        run: |
          if [ "${{ inputs.action }}" = "apply" ]; then
            terragrunt apply -auto-approve
          elif [ "${{ inputs.action }}" = "destroy" ]; then
            terragrunt destroy -auto-approve
          else
            terragrunt plan
          fi
