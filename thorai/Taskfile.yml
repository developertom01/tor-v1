version: "3"

vars:
  ENV: '{{default "dev" .ENV}}'

tasks:
  # ── Dev ─────────────────────────────────────────────────────────────────────
  dev:
    desc: Start Next.js dev server (port 3001)
    cmds:
      - npm run dev

  build:
    desc: Production build
    cmds:
      - npm run build

  lint:
    desc: Run ESLint
    cmds:
      - npm run lint

  install:
    desc: Install dependencies
    cmds:
      - npm install

  # ── Database ─────────────────────────────────────────────────────────────────
  db:start:
    desc: Start local Supabase (requires Docker)
    cmds:
      - npx supabase start

  db:stop:
    desc: Stop local Supabase
    cmds:
      - npx supabase stop

  db:reset:
    desc: Reset local DB — re-runs all migrations + seed
    cmds:
      - npx supabase db reset

  db:push:
    desc: "Push migrations to remote Supabase (ENV=dev|prod)"
    cmds:
      - doppler run --project thorai --config {{.ENV}} -- npx supabase db push

  db:migrate:
    desc: "Create a new migration file (NAME=migration_name)"
    cmds:
      - npx supabase migration new {{.NAME}}

  db:link:
    desc: "Link to remote Supabase project (ENV=dev|prod)"
    cmds:
      - doppler run --project thorai --config {{.ENV}} -- npx supabase link

  db:status:
    desc: Show local Supabase URLs and keys
    cmds:
      - npx supabase status

  # ── Terraform / Terragrunt ───────────────────────────────────────────────────
  tg:doppler:
    desc: "Create/update Doppler project (ENV=dev|prod)"
    dir: terraform/doppler
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt apply

  tg:vercel:
    desc: "Create/update Vercel project (ENV=dev|prod)"
    dir: terraform/vercel
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt apply

  tg:resend:
    desc: "Register Resend domain (ENV=dev|prod)"
    dir: terraform/resend
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt apply

  tg:plan:
    desc: "Plan a target (TARGET=doppler|vercel|resend|dev|prod, ENV=dev|prod)"
    dir: terraform/{{.TARGET}}
    preconditions:
      - sh: '[ -n "{{.TARGET}}" ]'
        msg: "TARGET required (e.g. task tg:plan TARGET=dev ENV=dev)"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt plan

  tg:apply:
    desc: "Apply a target (TARGET=doppler|vercel|resend|dev|prod, ENV=dev|prod)"
    dir: terraform/{{.TARGET}}
    preconditions:
      - sh: '[ -n "{{.TARGET}}" ]'
        msg: "TARGET required (e.g. task tg:apply TARGET=dev ENV=dev)"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt apply

  tg:destroy:
    desc: "Destroy a target (TARGET=doppler|vercel|resend|dev|prod, ENV=dev|prod)"
    dir: terraform/{{.TARGET}}
    preconditions:
      - sh: '[ -n "{{.TARGET}}" ]'
        msg: "TARGET required"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt destroy

  tg:init:
    desc: "Init a target (TARGET=doppler|vercel|resend|dev|prod, ENV=dev|prod)"
    dir: terraform/{{.TARGET}}
    preconditions:
      - sh: '[ -n "{{.TARGET}}" ]'
        msg: "TARGET required"
    cmds:
      - doppler run --project provisioner --config {{.ENV}} -- terragrunt init

  tg:all:
    desc: "Apply full provision pipeline: doppler → vercel → resend → dev (ENV=dev|prod)"
    cmds:
      - task: tg:doppler
        vars: { ENV: "{{.ENV}}" }
      - task: tg:vercel
        vars: { ENV: "{{.ENV}}" }
      - task: tg:resend
        vars: { ENV: "{{.ENV}}" }
      - task: tg:apply
        vars: { TARGET: "{{.ENV}}", ENV: "{{.ENV}}" }
